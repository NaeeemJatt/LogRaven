- id: lr-sigma-imported-92b00389
  title: Potential Access Token Abuse
  source: sigma
  log_type: windows_endpoint
  severity: medium
  description: Detects potential token impersonation and theft. Example, when using
    "DuplicateToken(Ex)" and "ImpersonateLoggedOnUser" with the "LOGON32_LOGON_NEW_CREDENTIALS
    flag".
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: event_id
      op: contains
      value: '4624'
    - field: extra.LogonType
      op: contains
      value: '9'
    - field: extra.LogonProcessName
      op: contains
      value: Advapi
    - field: extra.AuthenticationPackageName
      op: contains
      value: Negotiate
    - field: extra.ImpersonationLevel
      op: contains
      value: '%%1833'
    condition_logic: and
  mitre_technique_id: T1134.001
  mitre_tactic: privilege-escalation
  flag: privilege_escalation
- id: lr-sigma-imported-d967705a
