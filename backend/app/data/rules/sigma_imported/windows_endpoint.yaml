rules:
- id: lr-sigma-imported-0cb88319
  title: LSASS Process Crashed - Application
  source: sigma
  log_type: windows_endpoint
  severity: high
  description: Detects Windows error reporting events where the process that crashed
    is LSASS (Local Security Authority Subsystem Service). This could be the cause
    of a provoked crash by techniques such as [...]
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: extra.Provider_Name
      op: contains
      value: Application Error
    - field: event_id
      op: contains
      value: '1000'
    - field: extra.AppName
      op: contains
      value: lsass.exe
    - field: extra.ExceptionCode
      op: contains
      value: c0000001
    condition_logic: and
  mitre_technique_id: T1003.001
  mitre_tactic: credential-access
  flag: credential_access
- id: lr-sigma-imported-009199fe
  title: Microsoft Malware Protection Engine Crash
  source: sigma
  log_type: windows_endpoint
  severity: high
  description: This rule detects a suspicious crash of the Microsoft Malware Protection
    Engine
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: extra.Provider_Name
      op: contains
      value: Application Error
    - field: event_id
      op: contains
      value: '1000'
    - field: extra.Data
      op: contains_all
      values:
      - MsMpEng.exe
      - mpengine.dll
    condition_logic: and
  mitre_technique_id: T1211
  mitre_tactic: defense-evasion
  flag: log_tampering
- id: lr-sigma-imported-4b29310e
  title: Ntdsutil Abuse
  source: sigma
  log_type: windows_endpoint
  severity: medium
  description: Detects potential abuse of ntdsutil to dump ntds.dit database
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: extra.Provider_Name
      op: contains
      value: ESENT
    - field: event_id
      op: contains_any
      values:
      - '216'
      - '325'
      - '326'
      - '327'
    - field: extra.Data
      op: contains
      value: ntds.dit
    condition_logic: and
  mitre_technique_id: T1003.003
  mitre_tactic: credential-access
  flag: credential_access
- id: lr-sigma-imported-ee9113c6
  title: Dump Ntds.dit To Suspicious Location
  source: sigma
  log_type: windows_endpoint
  severity: medium
  description: Detects potential abuse of ntdsutil to dump ntds.dit database to a
    suspicious location
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: extra.Provider_Name
      op: contains
      value: ESENT
    - field: event_id
      op: contains
      value: '325'
    - field: extra.Data
      op: contains
      value: ntds.dit
    - field: extra.Data
      op: contains_any
      values:
      - :\ntds.dit
      - \Appdata\
      - \Desktop\
      - \Downloads\
      - \Perflogs\
      - \Temp\
      - \Users\Public\
    condition_logic: and
  mitre_tactic: execution
  flag: suspicious_process
- id: lr-sigma-imported-2412e249
  title: Audit CVE Event
  source: sigma
  log_type: windows_endpoint
  severity: critical
  description: Detects events generated by user-mode applications when they call the
    CveEventWrite API when a known vulnerability is trying to be exploited. MS started
    using this log in Jan. 2020 with [...]
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: extra.Provider_Name
      op: contains_any
      values:
      - Microsoft-Windows-Audit-CVE
      - Audit-CVE
    - field: event_id
      op: contains
      value: '1'
    condition_logic: and
  mitre_technique_id: T1203
  mitre_tactic: impact
  flag: suspicious_process
