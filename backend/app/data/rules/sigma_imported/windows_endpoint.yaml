- id: lr-sigma-imported-58ff9c6c
  title: Potential Privilege Escalation via Local Kerberos Relay over LDAP
  source: sigma
  log_type: windows_endpoint
  severity: high
  description: Detects a suspicious local successful logon event where the Logon Package
    is Kerberos, the remote address is set to localhost, and the target user SID is
    the built-in local Administrator [...]
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: event_id
      op: contains
      value: '4624'
    - field: extra.LogonType
      op: contains
      value: '3'
    - field: extra.AuthenticationPackageName
      op: contains
      value: Kerberos
    - field: source_ip
      op: contains
      value: 127.0.0.1
