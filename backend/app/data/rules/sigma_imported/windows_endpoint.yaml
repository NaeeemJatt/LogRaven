- id: lr-sigma-imported-70c9d027
  title: MSSQL Add Account To Sysadmin Role
  source: sigma
  log_type: windows_endpoint
  severity: high
  description: Detects when an attacker tries to backdoor the MSSQL server by adding
    a backdoor account to the sysadmin fixed server role
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: extra.Provider_Name
      op: contains
      value: MSSQL
    - field: event_id
      op: contains
      value: '33205'
    - field: extra.Data
      op: contains_all
      values:
      - object_name:sysadmin
      - 'statement:alter server role [sysadmin] add member '
    condition_logic: and
  mitre_tactic: persistence
  flag: persistence_mechanism
- id: lr-sigma-imported-8bab58f4
  title: MSSQL Destructive Query
  source: sigma
  log_type: windows_endpoint
  severity: medium
  description: Detects the invocation of MS SQL transactions that are destructive
    towards table or database data, such as "DROP TABLE" or "DROP DATABASE".
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: windows_endpoint
    conditions:
    - field: extra.Provider_Name
      op: contains
      value: MSSQLSERVER$AUDIT
    - field: event_id
      op: contains
      value: '33205'
    - field: extra.Data
      op: contains_any
      values:
      - statement:TRUNCATE TABLE
      - statement:DROP TABLE
      - statement:DROP DATABASE
    condition_logic: and
  mitre_technique_id: T1485
  mitre_tactic: impact
  flag: suspicious_process
