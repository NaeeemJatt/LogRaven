- id: lr-sigma-imported-351eace3
  title: ASLR Disabled Via Sysctl or Direct Syscall - Linux
  source: sigma
  log_type: linux_endpoint
  severity: high
  description: 'Detects actions that disable Address Space Layout Randomization (ASLR)
    in Linux, including: - Use of the `personality` syscall with the ADDR_NO_RANDOMIZE
    flag (0x0040000) - Modification of the [...]'
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: linux_endpoint
    conditions:
    - field: extra.type
      op: contains
      value: SYSCALL
    - field: extra.SYSCALL
      op: contains
      value: personality
    - field: extra.a0
      op: contains
      value: '40000'
    - field: extra.type
      op: contains
      value: EXECVE
    - field: extra.a0
      op: contains
      value: sysctl
    - field: extra.a1
      op: contains
      value: -w
    - field: extra.a2
      op: contains
      value: kernel.randomize_va_space=0
    condition_logic: or
  mitre_technique_id: T1562.001
  mitre_tactic: defense-evasion
