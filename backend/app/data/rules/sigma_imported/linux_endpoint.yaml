rules:
- id: lr-sigma-imported-24a870ec
  title: Bpfdoor TCP Ports Redirect
  source: sigma
  log_type: linux_endpoint
  severity: medium
  description: All TCP traffic on particular port from attacker is routed to different
    port. ex. '/sbin/iptables -t nat -D PREROUTING -p tcp -s 192.168.1.1 --dport 22
    -j REDIRECT --to-ports 42392' The traffic [...]
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: linux_endpoint
    conditions:
    - field: extra.type
      op: contains
      value: EXECVE
    - field: extra.a0
      op: endswith
      value: iptables
    - field: extra.a1
      op: contains
      value: -t
    - field: extra.a2
      op: contains
      value: nat
    condition_logic: and
  mitre_technique_id: T1562.004
  mitre_tactic: defense-evasion
  flag: log_tampering
- id: lr-sigma-imported-f220df3a
  title: Linux Capabilities Discovery
  source: sigma
  log_type: linux_endpoint
  severity: low
  description: Detects attempts to discover the files with setuid/setgid capability
    on them. That would allow adversary to escalate their privileges.
  enabled: true
  requires_sysmon: false
  match:
    type: simple
    log_type: linux_endpoint
    conditions:
    - field: extra.type
      op: contains
      value: EXECVE
    - field: extra.a0
      op: contains
      value: getcap
    - field: extra.a1
      op: contains
      value: -r
    - field: extra.a2
      op: contains
      value: /
    condition_logic: and
  mitre_technique_id: T1083
  mitre_tactic: privilege-escalation
  flag: privilege_escalation
- id: lr-sigma-imported-ccecd8e1
