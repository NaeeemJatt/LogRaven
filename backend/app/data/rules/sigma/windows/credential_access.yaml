rules:

  # ── Pass the Hash ──────────────────────────────────────────────────────────

  - id: lr-sigma-win-cred-001
    title: Pass the Hash — NTLM Network Logon (EventID 4624)
    source: sigma
    log_type: windows_endpoint
    severity: high
    mitre_technique_id: T1550.002
    mitre_tactic: lateral-movement
    flag: lateral_movement_candidate
    description: >
      Network logon (Type 3) using NTLM authentication package without a Kerberos ticket.
      A strong indicator of Pass-the-Hash (PTH) lateral movement.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4624"
        - field: extra.LogonType
          op: eq
          value: "3"
        - field: extra.AuthenticationPackageName
          op: contains
          value: NTLM
      condition_logic: and

  # ── Kerberoasting ──────────────────────────────────────────────────────────

  - id: lr-sigma-win-cred-002
    title: Kerberoasting — RC4 Service Ticket Request (EventID 4769)
    source: sigma
    log_type: windows_endpoint
    severity: high
    mitre_technique_id: T1558.003
    mitre_tactic: credential-access
    flag: credential_access
    description: >
      Kerberos service ticket requested using RC4 encryption (0x17/23).
      Modern environments should use AES; RC4 requests are a strong Kerberoasting indicator.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4769"
        - field: extra.TicketEncryptionType
          op: in
          values: ["0x17", "0x18", "23", "24"]
      condition_logic: and

  - id: lr-sigma-win-cred-003
    title: AS-REP Roasting — Pre-auth Not Required (EventID 4768)
    source: sigma
    log_type: windows_endpoint
    severity: high
    mitre_technique_id: T1558.004
    mitre_tactic: credential-access
    flag: credential_access
    description: >
      Kerberos AS request succeeded without pre-authentication (RC4 encrypted).
      Indicates AS-REP Roasting targeting accounts with pre-auth disabled.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4768"
        - field: extra.TicketEncryptionType
          op: in
          values: ["0x17", "0x18", "23"]
      condition_logic: and

  # ── DCSync (Credential Dump) ───────────────────────────────────────────────

  - id: lr-sigma-win-cred-004
    title: DCSync Attack — Directory Replication (EventID 4662)
    source: sigma
    log_type: windows_endpoint
    severity: critical
    mitre_technique_id: T1003.006
    mitre_tactic: credential-access
    flag: credential_access
    description: >
      Active Directory replication requested for object property DS-Replication-Get-Changes-All.
      DCSync allows dumping all domain credentials without touching LSASS.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4662"
        - field: extra.Properties
          op: contains_any
          values:
            - "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"
            - "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"
            - "89e95b76-444d-4c62-991a-0facbeda640c"
      condition_logic: and

  # ── Brute Force against Privileged Accounts ────────────────────────────────

  - id: lr-sigma-win-cred-005
    title: Admin Account Authentication Failures (EventID 4625)
    source: sigma
    log_type: windows_endpoint
    severity: high
    mitre_technique_id: T1110.001
    mitre_tactic: credential-access
    flag: brute_force_candidate
    description: Authentication failure targeting an account with 'admin' in its name.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4625"
        - field: username
          op: contains
          value: admin
      condition_logic: and

  # ── LSASS / Credential Dump Indicators ────────────────────────────────────

  - id: lr-sigma-win-cred-006
    title: Mimikatz Keyword in Log Message
    source: sigma
    log_type: windows_endpoint
    severity: critical
    mitre_technique_id: T1003.001
    mitre_tactic: credential-access
    flag: credential_access
    description: Mimikatz keyword found in event log data. Direct evidence of credential dumping tool.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: raw_message
          op: contains_any
          values:
            - mimikatz
            - "sekurlsa"
            - "lsadump"
            - "privilege::debug"
            - "sekurlsa::logonpasswords"

  - id: lr-sigma-win-cred-007
    title: RDP Interactive Logon — Remote Desktop (EventID 4624 LogonType 10)
    source: sigma
    log_type: windows_endpoint
    severity: medium
    mitre_technique_id: T1021.001
    mitre_tactic: lateral-movement
    flag: lateral_movement_candidate
    description: Remote interactive logon via RDP (LogonType 10). May be legitimate but log for correlation.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4624"
        - field: extra.LogonType
          op: eq
          value: "10"
      condition_logic: and

  - id: lr-sigma-win-cred-008
    title: SMB Network Logon to Admin Shares (EventID 4624 LogonType 3)
    source: sigma
    log_type: windows_endpoint
    severity: medium
    mitre_technique_id: T1021.002
    mitre_tactic: lateral-movement
    flag: lateral_movement_candidate
    description: Network logon (SMB Type 3). Combined with admin share access indicates lateral movement.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4624"
        - field: extra.LogonType
          op: eq
          value: "3"
      condition_logic: and

  # ── Golden / Silver Ticket ─────────────────────────────────────────────────

  - id: lr-sigma-win-cred-009
    title: Possible Golden Ticket — Suspicious Kerberos TGT (EventID 4768)
    source: sigma
    log_type: windows_endpoint
    severity: critical
    mitre_technique_id: T1558.001
    mitre_tactic: credential-access
    flag: credential_access
    description: >
      Kerberos TGT issued with suspicious options. Potential Golden Ticket use
      when ticket lifetime or renewal time is abnormally high.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4768"
        - field: extra.TicketOptions
          op: contains_any
          values: ["0x40810010", "0x40810000", "0x40800010"]
      condition_logic: and

  # ── Domain Account Discovery ───────────────────────────────────────────────

  - id: lr-sigma-win-cred-010
    title: User Account Enumeration (EventID 4798)
    source: sigma
    log_type: windows_endpoint
    severity: low
    mitre_technique_id: T1087.002
    mitre_tactic: discovery
    flag: recon_candidate
    description: A user's local group membership was enumerated. Often precedes privilege escalation.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4798"

  - id: lr-sigma-win-cred-011
    title: Security Group Enumeration (EventID 4799)
    source: sigma
    log_type: windows_endpoint
    severity: low
    mitre_technique_id: T1069.002
    mitre_tactic: discovery
    flag: recon_candidate
    description: A security-enabled local group's membership was enumerated.
    match:
      type: simple
      log_type: windows_endpoint
      conditions:
        - field: event_id
          op: eq
          value: "4799"

  - id: lr-sigma-win-cred-012
    title: Domain Controller Logon Failure Spike
    source: sigma
    log_type: windows_endpoint
    severity: critical
    mitre_technique_id: T1110.003
    mitre_tactic: credential-access
    flag: brute_force_candidate
    description: 15+ authentication failures from the same IP in 2 minutes — DC-targeting brute force.
    match:
      type: threshold
      log_type: windows_endpoint
      event_type: auth_failure
      group_by: source_ip
      count: 15
      window_seconds: 120
